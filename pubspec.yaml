name: farmers_market_app
description: 'A new Flutter project.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # HTTP client
  dio: ^5.4.0
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4
  # Secure token storage
  flutter_secure_storage: ^9.0.0
  # Navigation
  go_router: ^13.2.0
  # Local storage for offline support
  sqflite: ^2.3.2
  path: ^1.9.0
  # Connectivity check
  connectivity_plus: ^6.0.3
  # UI helpers
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
